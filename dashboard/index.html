<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpellChecker MN | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --bg: #eef2f8;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-dim: #556479;
            --border-color: rgba(15, 23, 42, 0.07);
            --shadow: rgba(15, 23, 42, 0.06);
            --card-bg-subtle: rgba(241, 245, 251, 0.85);
            --accent-green: #059669;
            --accent-red: #dc2626;
        }
        [data-theme="dark"] {
            --bg: #0b1120;
            --card-bg: rgba(30, 41, 59, 0.65);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow: rgba(0, 0, 0, 0.45);
            --card-bg-subtle: rgba(30, 41, 59, 0.45);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Inter", "SF Pro Display", -apple-system, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 0% 0%, rgba(79, 172, 254, 0.15), transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(0, 242, 254, 0.15), transparent 35%),
                var(--bg);
            color: var(--text-main);
            padding: 0;
        }

        body[data-theme="light"] {
            background:
                radial-gradient(ellipse at 15% -5%, rgba(79, 172, 254, 0.13), transparent 45%),
                radial-gradient(ellipse at 85% 105%, rgba(5, 150, 105, 0.08), transparent 45%),
                radial-gradient(ellipse at 50% 40%, rgba(255, 255, 255, 0.6), transparent 65%),
                var(--bg);
        }
        body[data-theme="light"] .welcome-banner {
            box-shadow:
                0 2px 6px rgba(79, 172, 254, 0.12),
                0 14px 36px -8px rgba(79, 172, 254, 0.22);
        }
        body[data-theme="light"] .info-card {
            box-shadow:
                0 0 0 1px rgba(15, 23, 42, 0.03),
                0 1px 3px rgba(15, 23, 42, 0.04),
                0 6px 24px -4px rgba(15, 23, 42, 0.07);
        }
        body[data-theme="light"] .info-card:hover {
            box-shadow:
                0 0 0 1px rgba(79, 172, 254, 0.1),
                0 1px 3px rgba(15, 23, 42, 0.04),
                0 12px 36px -6px rgba(15, 23, 42, 0.1);
        }
        body[data-theme="light"] .info-row {
            border-bottom-color: rgba(15, 23, 42, 0.05);
        }
        body[data-theme="light"] .info-card-icon.icon-profile {
            background: rgba(79, 172, 254, 0.1);
        }
        body[data-theme="light"] .info-card-icon.icon-payment {
            background: rgba(5, 150, 105, 0.1);
        }
        body[data-theme="light"] .btn-edit {
            background: rgba(79, 172, 254, 0.06);
            border-color: rgba(79, 172, 254, 0.18);
            color: var(--primary);
        }
        body[data-theme="light"] .btn-edit:hover {
            background: rgba(79, 172, 254, 0.12);
        }
        body[data-theme="light"] .edit-modal-overlay {
            background: rgba(15, 23, 42, 0.2);
            backdrop-filter: blur(10px) saturate(1.2);
        }
        body[data-theme="light"] .edit-modal {
            background: #ffffff;
            box-shadow:
                0 0 0 1px rgba(15, 23, 42, 0.04),
                0 24px 48px -12px rgba(15, 23, 42, 0.14);
        }
        body[data-theme="light"] .edit-form input {
            background: rgba(241, 245, 249, 0.7);
            border-color: rgba(15, 23, 42, 0.1);
        }
        body[data-theme="light"] .edit-form input:focus {
            background: #ffffff;
        }
        body[data-theme="light"] .edit-close {
            border-color: rgba(15, 23, 42, 0.08);
        }
        body[data-theme="light"] .edit-close:hover {
            background: rgba(15, 23, 42, 0.04);
        }
        body[data-theme="light"] .status-active {
            background: rgba(5, 150, 105, 0.08);
        }
        body[data-theme="light"] .status-inactive {
            background: rgba(220, 38, 38, 0.08);
        }
        body[data-theme="light"] .section-title {
            color: #475569;
        }

        .dashboard-page {
            max-width: 880px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        .welcome-banner {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 22px;
            padding: 28px 30px;
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 22px;
            box-shadow: 0 12px 40px -12px rgba(79, 172, 254, 0.35);
            position: relative;
            overflow: hidden;
        }
        .welcome-banner::after {
            content: "";
            position: absolute;
            right: -40px;
            top: -40px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }
        .welcome-avatar {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.15rem;
            color: #fff;
            flex-shrink: 0;
        }
        .welcome-text h1 {
            font-size: 1.35rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 3px;
        }
        .welcome-text p {
            color: rgba(255, 255, 255, 0.78);
            font-size: 0.92rem;
            margin: 0;
        }

        .section-title {
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title i {
            font-size: 0.9rem;
            color: var(--primary);
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .info-card {
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(6px);
            box-shadow: 0 4px 20px -8px var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .info-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px -10px var(--shadow);
        }
        .info-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .info-card-header .btn-edit {
            margin-left: auto;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-dim);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.15s, border-color 0.15s;
        }
        .info-card-header .btn-edit:hover {
            color: var(--primary);
            border-color: var(--primary);
        }
        .info-card-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .icon-profile {
            background: rgba(79, 172, 254, 0.14);
            color: var(--primary);
        }
        .icon-payment {
            background: rgba(16, 185, 129, 0.14);
            color: var(--accent-green);
        }
        .info-card-header h2 {
            font-size: 1.05rem;
            font-weight: 700;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            color: var(--text-dim);
            font-size: 0.88rem;
        }
        .info-value {
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.92rem;
            text-align: right;
            word-break: break-word;
            max-width: 60%;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .status-pill::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }
        .status-active {
            background: rgba(16, 185, 129, 0.14);
            color: var(--accent-green);
        }
        .status-active::before {
            background: var(--accent-green);
        }
        .status-inactive {
            background: rgba(239, 68, 68, 0.12);
            color: var(--accent-red);
        }
        .status-inactive::before {
            background: var(--accent-red);
        }


        .edit-modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 10001;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(3, 8, 18, 0.7);
            backdrop-filter: blur(8px);
            padding: 20px;
        }
        .edit-modal-overlay.open {
            display: flex;
        }
        .edit-modal {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            box-shadow: 0 24px 60px rgba(2, 8, 23, 0.4);
            padding: 24px;
            position: relative;
            backdrop-filter: blur(10px);
        }
        [data-theme="dark"] .edit-modal {
            background: linear-gradient(160deg, rgba(15, 23, 42, 0.94), rgba(30, 41, 59, 0.88));
        }
        .edit-modal h3 {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 16px;
        }
        .edit-modal .edit-close {
            position: absolute;
            top: 14px;
            right: 14px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-main);
            border-radius: 8px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .edit-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .edit-form label {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 600;
        }
        .edit-form input {
            width: 100%;
            border: 1px solid var(--border-color);
            background: rgba(148, 163, 184, 0.12);
            color: var(--text-main);
            border-radius: 12px;
            padding: 12px 14px;
            outline: none;
            font-size: 0.95rem;
        }
        .edit-form input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.2);
        }
        .edit-form input:read-only {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .edit-error {
            color: var(--accent-red);
            font-size: 0.84rem;
            min-height: 1em;
        }
        .edit-actions {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }
        .edit-actions .btn-save {
            flex: 1;
            border: none;
            border-radius: 12px;
            padding: 11px 14px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
        }
        .edit-actions .btn-save.loading {
            opacity: 0.75;
            pointer-events: none;
        }
        .edit-actions .btn-cancel {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 11px 14px;
            font-weight: 700;
            cursor: pointer;
            background: transparent;
            color: var(--text-main);
        }

        @media (max-width: 760px) {
            .info-grid { grid-template-columns: 1fr; }
            .welcome-banner { flex-direction: column; text-align: center; padding: 22px 20px; }
            .welcome-avatar { margin: 0 auto; }
        }
    </style>
</head>
<body data-theme="dark">
    <div id="header-root"></div>

    <main class="dashboard-page">
        <div class="welcome-banner">
            <div id="welcome-avatar" class="welcome-avatar">--</div>
            <div class="welcome-text">
                <h1 id="welcome-name">Тавтай морил</h1>
                <p id="user-email">...</p>
            </div>
        </div>

        <!-- <div class="section-title"><i class="fas fa-th-large"></i> Ерөнхий</div> -->

        <div class="info-grid">
            <article class="info-card">
                <div class="info-card-header">
                    <div class="info-card-icon icon-profile"><i class="fas fa-user"></i></div>
                    <h2>Миний мэдээлэл</h2>
                    <button id="btn-edit-profile" class="btn-edit" type="button"><i class="fas fa-pen"></i> Засах</button>
                </div>
                <div class="info-row">
                    <span class="info-label">Нэр</span>
                    <span id="profile-full-name" class="info-value">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Имэйл</span>
                    <span id="profile-email" class="info-value">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Бүртгүүлсэн</span>
                    <span id="profile-created-at" class="info-value">-</span>
                </div>
            </article>

            <article class="info-card">
                <div class="info-card-header">
                    <div class="info-card-icon icon-payment"><i class="fas fa-credit-card"></i></div>
                    <h2>Төлбөрийн мэдээлэл</h2>
                </div>
                <div class="info-row">
                    <span class="info-label">Төлөв</span>
                    <span id="payment-status" class="info-value">Идэвхтэй</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Багц</span>
                    <span id="payment-plan" class="info-value">Үнэгүй</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Хүчинтэй</span>
                    <span id="payment-until" class="info-value">-</span>
                </div>
            </article>
        </div>

    </main>

    <div id="edit-profile-overlay" class="edit-modal-overlay" aria-hidden="true">
        <div class="edit-modal">
            <button id="edit-close" class="edit-close" type="button">✕</button>
            <h3>Мэдээлэл засах</h3>
            <form id="edit-form" class="edit-form">
                <div>
                    <label for="edit-name">Нэр</label>
                    <input id="edit-name" type="text" placeholder="Бүтэн нэр">
                </div>
                <div>
                    <label for="edit-email-display">Имэйл</label>
                    <input id="edit-email-display" type="email" readonly>
                </div>
                <div id="edit-error" class="edit-error"></div>
                <div class="edit-actions">
                    <button id="edit-save" class="btn-save" type="submit">Хадгалах</button>
                    <button id="edit-cancel" class="btn-cancel" type="button">Болих</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://irqjecjpfktyzoflrcdt.supabase.co";
        const SUPABASE_PUBLISHABLE_DEFAULT_KEY = "sb_publishable_9_26pSQbJ64aeYNZxTY8vA_-Rx0TNuf";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_DEFAULT_KEY);

        const PATHS = {
            home: "/",
            dashboard: "/dashboard",
            headerFile: "../components/header.html"
        };

        const pageEls = {
            headerRoot: document.getElementById("header-root"),
            welcomeAvatar: document.getElementById("welcome-avatar"),
            welcomeName: document.getElementById("welcome-name"),
            userEmail: document.getElementById("user-email"),
            profileFullName: document.getElementById("profile-full-name"),
            profileEmail: document.getElementById("profile-email"),
            profileCreatedAt: document.getElementById("profile-created-at"),
            // paymentStatus: document.getElementById("payment-status"),
            // paymentPlan: document.getElementById("payment-plan"),
            // paymentUntil: document.getElementById("payment-until"),
            btnEditProfile: document.getElementById("btn-edit-profile"),
            editOverlay: document.getElementById("edit-profile-overlay"),
            editClose: document.getElementById("edit-close"),
            editForm: document.getElementById("edit-form"),
            editName: document.getElementById("edit-name"),
            editEmailDisplay: document.getElementById("edit-email-display"),
            editError: document.getElementById("edit-error"),
            editSave: document.getElementById("edit-save"),
            editCancel: document.getElementById("edit-cancel"),
        };

        const headerEls = {
            authStatus: null, authBtn: null, avatarMenu: null,
            menuDashboardBtn: null, menuLogoutBtn: null,
            themeToggle: null, themeIcon: null
        };

        function isFileProtocol() { return window.location.protocol === "file:"; }

        function getHeaderPath() {
            return isFileProtocol() ? PATHS.headerFile : "/components/header.html";
        }

        function navigateTo(path) {
            if (!isFileProtocol()) { window.location.href = path; return; }
            window.location.href = path === PATHS.dashboard ? "./index.html" : "../index.html";
        }

        function closeAvatarMenu() {
            if (!headerEls.avatarMenu) return;
            headerEls.avatarMenu.classList.remove("open");
            headerEls.avatarMenu.setAttribute("aria-hidden", "true");
        }

        function toggleAvatarMenu() {
            if (!headerEls.avatarMenu) return;
            const isOpen = headerEls.avatarMenu.classList.toggle("open");
            headerEls.avatarMenu.setAttribute("aria-hidden", isOpen ? "false" : "true");
        }

        function getInitials(email) {
            return email.replace(/[^a-zA-Z0-9]/g, "").slice(0, 2).toUpperCase() || "US";
        }

        function formatDate(value) {
            if (!value) return "-";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return "-";
            return date.toLocaleDateString("mn-MN", { year: "numeric", month: "2-digit", day: "2-digit" });
        }

        function setPaymentStatus(active, text) {
            if (!pageEls.paymentStatus) return;
            pageEls.paymentStatus.innerHTML = `<span class="status-pill ${active ? "status-active" : "status-inactive"}">${text}</span>`;
        }

        function applyThemeFromStorage() {
            const savedTheme = localStorage.getItem("theme");
            const isLight = savedTheme === "light";
            document.body.setAttribute("data-theme", isLight ? "light" : "dark");
            if (headerEls.themeIcon) {
                headerEls.themeIcon.classList.toggle("fa-sun", !isLight);
                headerEls.themeIcon.classList.toggle("fa-moon", isLight);
            }
        }

        function bindThemeToggle() {
            if (!headerEls.themeToggle || !headerEls.themeIcon) return;
            applyThemeFromStorage();
            headerEls.themeToggle.addEventListener("click", () => {
                const nextTheme = document.body.getAttribute("data-theme") === "dark" ? "light" : "dark";
                localStorage.setItem("theme", nextTheme);
                applyThemeFromStorage();
            });
        }

        function updateHeaderAuth(user) {
            if (!headerEls.authStatus || !headerEls.authBtn) return;
            if (user?.email) {
                headerEls.authStatus.textContent = getInitials(user.email);
                headerEls.authStatus.title = user.email;
                headerEls.authStatus.style.display = "flex";
            } else {
                headerEls.authStatus.textContent = "--";
                headerEls.authStatus.title = "Нэвтрээгүй";
                headerEls.authStatus.style.display = "none";
                closeAvatarMenu();
            }
            headerEls.authBtn.textContent = "Нүүр";
            headerEls.authBtn.style.display = user ? "none" : "";
            if (headerEls.menuDashboardBtn) headerEls.menuDashboardBtn.style.display = user ? "" : "none";
            if (headerEls.menuLogoutBtn) headerEls.menuLogoutBtn.style.display = user ? "" : "none";
        }

        function bindHeaderActions() {
            if (!headerEls.authBtn || !headerEls.authStatus) return;
            headerEls.authBtn.addEventListener("click", () => navigateTo(PATHS.home));
            headerEls.authStatus.addEventListener("click", (e) => { e.stopPropagation(); toggleAvatarMenu(); });
            if (headerEls.menuDashboardBtn) {
                headerEls.menuDashboardBtn.addEventListener("click", () => { closeAvatarMenu(); navigateTo(PATHS.dashboard); });
            }
            if (headerEls.menuLogoutBtn) {
                headerEls.menuLogoutBtn.addEventListener("click", async () => { closeAvatarMenu(); await supabaseClient.auth.signOut(); navigateTo(PATHS.home); });
            }
            document.addEventListener("click", (e) => {
                if (!headerEls.avatarMenu || !headerEls.avatarMenu.classList.contains("open")) return;
                if (!headerEls.avatarMenu.contains(e.target) && e.target !== headerEls.authStatus) closeAvatarMenu();
            });
        }

        async function loadHeader() {
            const response = await fetch(getHeaderPath());
            pageEls.headerRoot.innerHTML = await response.text();
            const logoLink = pageEls.headerRoot.querySelector(".logo");
            if (logoLink) logoLink.setAttribute("href", isFileProtocol() ? "../index.html" : "/");
            headerEls.authStatus = document.getElementById("auth-status");
            headerEls.authBtn = document.getElementById("auth-btn");
            headerEls.avatarMenu = document.getElementById("avatar-menu");
            headerEls.menuDashboardBtn = document.getElementById("menu-dashboard-btn");
            headerEls.menuLogoutBtn = document.getElementById("menu-logout-btn");
            headerEls.themeToggle = document.getElementById("theme-toggle");
            headerEls.themeIcon = document.getElementById("theme-icon");
        }

        async function requireSession() {
            const { data } = await supabaseClient.auth.getSession();
            const user = data?.session?.user || null;
            if (!user) { navigateTo(PATHS.home); return null; }
            return user;
        }

        async function loadProfile(user) {
            pageEls.profileEmail.textContent = user.email || "-";
            const { data, error } = await supabaseClient
                .from("profiles")
                .select("full_name, email, created_at")
                .eq("id", user.id)
                .maybeSingle();

            if (error || !data) {
                pageEls.profileFullName.textContent = "-";
                pageEls.profileCreatedAt.textContent = "-";
                return;
            }

            const name = data.full_name?.trim() || "";
            pageEls.profileFullName.textContent = name || "-";
            pageEls.profileEmail.textContent = data.email || user.email || "-";
            pageEls.profileCreatedAt.textContent = formatDate(data.created_at);

            if (name) pageEls.welcomeName.textContent = `Тавтай морил, ${name}`;
        }

        async function loadActivePayment(user) {
            setPaymentStatus(false, "Мэдээлэл алга");
            pageEls.paymentPlan.textContent = "-";
            pageEls.paymentUntil.textContent = "-";

            const subRes = await supabaseClient
                .from("subscriptions")
                .select("status, plan, current_period_end, updated_at")
                .eq("user_id", user.id)
                .order("updated_at", { ascending: false })
                .limit(1).maybeSingle();

            if (!subRes.error && subRes.data) {
                const s = subRes.data;
                const active = String(s.status || "").toLowerCase() === "active";
                setPaymentStatus(active, active ? "Идэвхтэй" : (s.status || "Идэвхгүй"));
                pageEls.paymentPlan.textContent = s.plan || "-";
                pageEls.paymentUntil.textContent = formatDate(s.current_period_end);
                return;
            }

            const payRes = await supabaseClient
                .from("payments")
                .select("status, plan, expires_at, created_at")
                .eq("user_id", user.id)
                .order("created_at", { ascending: false })
                .limit(1).maybeSingle();

            if (!payRes.error && payRes.data) {
                const p = payRes.data;
                const active = String(p.status || "").toLowerCase() === "active";
                setPaymentStatus(active, active ? "Идэвхтэй" : (p.status || "Идэвхгүй"));
                pageEls.paymentPlan.textContent = p.plan || "-";
                pageEls.paymentUntil.textContent = formatDate(p.expires_at);
                return;
            }

            setPaymentStatus(false, "Төлбөрийн хүснэгт холбогдоогүй");
        }


        let currentUser = null;

        function openEditModal() {
            pageEls.editError.textContent = "";
            pageEls.editName.value = pageEls.profileFullName.textContent === "-" ? "" : pageEls.profileFullName.textContent;
            pageEls.editEmailDisplay.value = currentUser?.email || "";
            pageEls.editOverlay.classList.add("open");
            pageEls.editOverlay.setAttribute("aria-hidden", "false");
            requestAnimationFrame(() => pageEls.editName.focus());
        }

        function closeEditModal() {
            pageEls.editOverlay.classList.remove("open");
            pageEls.editOverlay.setAttribute("aria-hidden", "true");
        }

        async function handleEditSave(e) {
            e.preventDefault();
            const btn = pageEls.editSave;
            const newName = pageEls.editName.value.trim();
            pageEls.editError.textContent = "";

            btn.classList.add("loading");
            btn.textContent = "Хадгалж байна...";

            const { error } = await supabaseClient
                .from("profiles")
                .update({ full_name: newName, updated_at: new Date().toISOString() })
                .eq("id", currentUser.id);

            btn.classList.remove("loading");
            btn.textContent = "Хадгалах";

            if (error) {
                pageEls.editError.textContent = error.message || "Хадгалах үед алдаа гарлаа";
                return;
            }

            pageEls.profileFullName.textContent = newName || "-";
            if (newName) {
                pageEls.welcomeName.textContent = `Тавтай морил, ${newName}`;
            } else {
                pageEls.welcomeName.textContent = "Тавтай морил";
            }

            closeEditModal();
        }

        function bindEditProfile() {
            pageEls.btnEditProfile.addEventListener("click", openEditModal);
            pageEls.editClose.addEventListener("click", closeEditModal);
            pageEls.editCancel.addEventListener("click", closeEditModal);
            pageEls.editForm.addEventListener("submit", handleEditSave);
            pageEls.editOverlay.addEventListener("click", (e) => {
                if (e.target === pageEls.editOverlay) closeEditModal();
            });
        }

        async function init() {
            await loadHeader();
            bindThemeToggle();
            bindHeaderActions();

            const user = await requireSession();
            if (!user) return;
            currentUser = user;

            const initials = getInitials(user.email || "");
            pageEls.welcomeAvatar.textContent = initials;
            pageEls.userEmail.textContent = user.email || "Нэвтэрсэн хэрэглэгч";
            updateHeaderAuth(user);
            bindEditProfile();

            await Promise.all([loadProfile(user), loadActivePayment(user)]);
        }

        init();
    </script>
</body>
</html>
