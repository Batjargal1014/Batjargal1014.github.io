<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | SpellChecker MN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --bg: #0b1120;
            --card-bg: rgba(30, 41, 59, 0.5);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'SF Pro Display', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(79, 172, 254, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .error-container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px var(--shadow);
            animation: fadeIn 0.8s ease-out;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(79, 172, 254, 0.3));
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        p {
            color: var(--text-dim);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-back {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            padding: 16px 32px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.2);
        }

        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(79, 172, 254, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Чимэглэл: Хөвж буй дугуйнууд */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(100px);
            opacity: 0.1;
            z-index: -1;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }
    </style>
</head>
<body>
    <div class="blob" style="top: 20%; left: 20%;"></div>
    <div class="blob" style="bottom: 20%; right: 20%; background: var(--secondary);"></div>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1>Хуудас олдсонгүй</h1>
        <p>Уучлаарай, таны хайсан хуудас байхгүй эсвэл нүүсэн байна. Та доорх товчийг ашиглан нүүр хуудас руу буцна уу.</p>
        
        <a href="/" class="btn-back">
            <i class="fas fa-arrow-left"></i>
            Нүүр хуудас руу буцах
        </a>
    </div>
</body>
</html>
